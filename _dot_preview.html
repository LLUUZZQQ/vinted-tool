<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>指示灯预览</title>
<style>
body { font-family:"Microsoft YaHei","PingFang SC",sans-serif; background:#0a0a0a; padding:40px; color:#ccc; }
.row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
.item { position:relative; display:inline-flex; align-items:center; font-size:13px; padding:2px 0; cursor:pointer; }
.item input { margin:0 6px 0 0; accent-color:#111; }
.dot {
  position:absolute;
  width:4px; height:4px;
  border-radius:2px;
  top:0px;
  right:-6px;
}
.dot.on  { background:#10b981; }
.dot.off { background:#444; }
</style>
</head>
<body>
<p style="font-size:11px;color:#555;margin-bottom:16px;">← 圆点放在文字最右上方，4px</p>

<div class="row">
<div class="item"><input type="checkbox" checked>智能画质引擎<span class="dot on"></span></div>
<div class="item"><input type="checkbox">无损画质<span class="dot off"></span></div>
<div class="item"><input type="checkbox" checked>隐形水印<span class="dot on"></span></div>
<div class="item"><input type="checkbox" checked>高级防检测<span class="dot on"></span></div>
</div>
<div class="row">
<div class="item"><input type="checkbox" checked>机模画幅匹配<span class="dot on"></span></div>
<div class="item"><input type="checkbox" checked>深度防重处理<span class="dot on"></span></div>
</div>

</body>
</html>
